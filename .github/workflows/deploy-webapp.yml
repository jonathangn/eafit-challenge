name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'persona-ai-agent-creator/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: persona-ai-agent-creator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./persona-ai-agent-creator
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/persona-ai-agent-creator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/persona-ai-agent-creator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "✅ Image pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/persona-ai-agent-creator:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/persona-ai-agent-creator:${{ github.sha }}"
