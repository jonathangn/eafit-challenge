name: Build and Deploy Persona Creator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/persona-creator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/persona-creator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Image Tag
        run: |
          cd k8s
          kustomize edit set image persona-creator-image=${{ secrets.DOCKERHUB_USERNAME }}/persona-creator:${{ github.sha }}

      - name: Deploy to Kubernetes
        run: |
          # This assumes a kubeconfig is provided or the runner has access
          # In the Verana context, we might use a specific deployment tool or curl
          echo "Applying manifests to Kubernetes..."
          kubectl apply -k k8s/
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
