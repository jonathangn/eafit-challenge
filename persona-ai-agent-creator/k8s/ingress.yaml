apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: persona-creator-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-gzip: "true"
spec:
  tls:
  - hosts:
    - persona.team-f.teams.eafit.testnet.verana.network
    secretName: persona-creator-tls
  rules:
  - host: persona.team-f.teams.eafit.testnet.verana.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: persona-creator-service
            port:
              number: 80
