<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient (No border, fully bleedable) -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#140d30" />
      <stop offset="100%" stop-color="#05030e" />
    </radialGradient>
    
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <linearGradient id="neonViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#6e0df2" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="slightGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Bleedable Background for Cropping -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Centered Content within the Safe Area (scaled and padded) -->
  <g transform="translate(56, 56) scale(0.78)">
    <!-- Glowing Core -->
    <circle cx="256" cy="256" r="150" fill="#0d0a1b" stroke="url(#neonViolet)" stroke-width="6" filter="url(#glow)" />
    
    <!-- AI Shield / Robot Face Silhouette -->
    <path d="M 186,186 C 186,150 326,150 326,186 C 326,250 310,296 256,336 C 202,296 186,250 186,186 Z" fill="none" stroke="url(#neonCyan)" stroke-width="5" stroke-linejoin="round" filter="url(#slightGlow)" />
    
    <!-- Robot Ear Accents -->
    <path d="M 166,216 L 186,230 M 346,216 L 326,230" stroke="url(#neonViolet)" stroke-width="4" stroke-linecap="round" />
    <circle cx="160" cy="210" r="6" fill="#f355da" filter="url(#slightGlow)" />
    <circle cx="352" cy="210" r="6" fill="#f355da" filter="url(#slightGlow)" />

    <!-- Neon Eyeline & Cyber Eyes -->
    <path d="M 210,220 L 245,220 M 267,220 L 302,220" stroke="#ffffff" stroke-width="4" stroke-linecap="round" filter="url(#slightGlow)" />
    <polygon points="215,216 225,220 215,224" fill="#00f2fe" filter="url(#slightGlow)" />
    <polygon points="297,216 287,220 297,224" fill="#00f2fe" filter="url(#slightGlow)" />

    <!-- Brain CPU Nodes (Upper Head) -->
    <path d="M 256,150 L 256,130" stroke="url(#neonCyan)" stroke-width="3" />
    <circle cx="256" cy="125" r="7" fill="url(#neonCyan)" filter="url(#slightGlow)" />
    
    <!-- Circuit lines radiating from center -->
    <path d="M 226,165 L 206,155 M 286,165 L 306,155" stroke="url(#neonViolet)" stroke-width="2" />
    <circle cx="202" cy="153" r="4" fill="#f355da" />
    <circle cx="310" cy="153" r="4" fill="#f355da" />

    <!-- Glowing Cyber Mouth/Vizor -->
    <path d="M 226,266 Q 256,286 286,266" fill="none" stroke="url(#neonCyan)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
    <path d="M 240,295 H 272" stroke="url(#neonViolet)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
