<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a113c" />
      <stop offset="100%" stop-color="#070412" />
    </radialGradient>
    
    <!-- Neon Violet and Blue Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b92b27" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>

    <linearGradient id="neonViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#6e0df2" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="slightGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Premium Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />

  <!-- Outer Glowing Shield/Circuit -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#neonViolet)" stroke-width="3" opacity="0.3" />
  <rect x="36" y="36" width="440" height="440" rx="78" fill="none" stroke="url(#neonCyan)" stroke-width="1.5" opacity="0.2" />

  <!-- Abstract Tech Accents (Circuits) -->
  <path d="M 120,80 L 80,120 M 392,80 L 432,120 M 120,432 L 80,392 M 392,432 L 432,392" stroke="url(#neonCyan)" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  
  <g transform="translate(10, 10)">
    <!-- Glowing Core -->
    <circle cx="246" cy="246" r="140" fill="#0d0a1b" stroke="url(#neonViolet)" stroke-width="6" filter="url(#glow)" />
    
    <!-- AI Shield / Robot Face Silhouette -->
    <path d="M 176,176 C 176,140 316,140 316,176 C 316,240 300,286 246,326 C 192,286 176,240 176,176 Z" fill="none" stroke="url(#neonCyan)" stroke-width="5" stroke-linejoin="round" filter="url(#slightGlow)" />
    
    <!-- Robot Ear Accents -->
    <path d="M 156,206 L 176,220 M 336,206 L 316,220" stroke="url(#neonViolet)" stroke-width="4" stroke-linecap="round" />
    <circle cx="150" cy="200" r="6" fill="#f355da" filter="url(#slightGlow)" />
    <circle cx="342" cy="200" r="6" fill="#f355da" filter="url(#slightGlow)" />

    <!-- Neon Eyeline & Cyber Eyes -->
    <path d="M 200,210 L 235,210 M 257,210 L 292,210" stroke="#ffffff" stroke-width="4" stroke-linecap="round" filter="url(#slightGlow)" />
    <polygon points="205,206 215,210 205,214" fill="#00f2fe" filter="url(#slightGlow)" />
    <polygon points="287,206 277,210 287,214" fill="#00f2fe" filter="url(#slightGlow)" />

    <!-- Brain CPU Nodes (Upper Head) -->
    <path d="M 246,140 L 246,120" stroke="url(#neonCyan)" stroke-width="3" />
    <circle cx="246" cy="115" r="7" fill="url(#neonCyan)" filter="url(#slightGlow)" />
    
    <!-- Circuit lines radiating from center -->
    <path d="M 216,155 L 196,145 M 276,155 L 296,145" stroke="url(#neonViolet)" stroke-width="2" />
    <circle cx="192" cy="143" r="4" fill="#f355da" />
    <circle cx="300" cy="143" r="4" fill="#f355da" />

    <!-- Glowing Cyber Mouth/Vizor -->
    <path d="M 216,256 Q 246,276 276,256" fill="none" stroke="url(#neonCyan)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
    <path d="M 230,285 H 262" stroke="url(#neonViolet)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
