<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | Persona Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #05030e;
      --bg-card: rgba(13, 10, 27, 0.45);
      --border-card: rgba(243, 85, 218, 0.2);
      --text-main: #fcfbfe;
      --text-muted: #9e9cb2;
      --neon-cyan: #00f2fe;
      --neon-violet: #f355da;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at 50% 50%, #150f35 0%, var(--bg-dark) 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glowing spheres in background */
    .glow-sphere {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      z-index: 1;
      opacity: 0.4;
    }

    .sphere-violet {
      width: 400px;
      height: 400px;
      background: var(--neon-violet);
      top: -100px;
      left: -100px;
      animation: float 12s ease-in-out infinite alternate;
    }

    .sphere-cyan {
      width: 500px;
      height: 500px;
      background: var(--neon-cyan);
      bottom: -150px;
      right: -150px;
      animation: float 15s ease-in-out infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Glassmorphism Card Container */
    .offline-card {
      position: relative;
      z-index: 10;
      background: var(--bg-card);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border-card);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      width: 90%;
      max-width: 480px;
      padding: 48px 32px;
      text-align: center;
      animation: fadeInScale 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Custom Pulsing Connection SVG */
    .icon-container {
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
      background: rgba(243, 85, 218, 0.08);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(243, 85, 218, 0.25);
      position: relative;
      animation: pulseGlow 3s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(243, 85, 218, 0.4);
      }
      50% {
        box-shadow: 0 0 25px 8px rgba(243, 85, 218, 0.15);
      }
    }

    .icon-container .material-symbols-outlined {
      font-size: 48px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(243, 85, 218, 0.12);
      border: 1px solid rgba(243, 85, 218, 0.3);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--neon-violet);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 30%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-violet));
      border: none;
      border-radius: 14px;
      color: #05030e;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(243, 85, 218, 0.35);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(243, 85, 218, 0.5),
                  0 0 15px rgba(0, 242, 254, 0.3);
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    .btn-retry .material-symbols-outlined {
      font-size: 20px;
      font-weight: bold;
    }

    /* Bilingual Switcher Indicator */
    .lang-hint {
      margin-top: 24px;
      font-size: 11px;
      color: rgba(158, 156, 178, 0.5);
    }
  </style>
</head>
<body>
  <!-- Ambient background glow elements -->
  <div class="glow-sphere sphere-violet"></div>
  <div class="glow-sphere sphere-cyan"></div>

  <div class="offline-card">
    <div class="icon-container">
      <span class="material-symbols-outlined">wifi_off</span>
    </div>
    
    <div class="status-badge" id="badge">Sin Conexión</div>
    
    <h1 id="title">¿Te has quedado sin red?</h1>
    <p id="desc">
      Parece que has entrado a una zona de sombra digital. No te preocupes, tus agentes están guardados de forma segura en la nube. ¡Conéctate de nuevo para seguir creando!
    </p>
    
    <button class="btn-retry" onclick="retryConnection()">
      <span class="material-symbols-outlined">autorenew</span>
      <span id="btn-text">Reintentar Conexión</span>
    </button>

    <div class="lang-hint">
      Press retry to attempt connection • Presiona reintentar para conectar
    </div>
  </div>

  <script>
    // Simple language selector logic based on browser settings
    const userLang = navigator.language || navigator.userLanguage || 'es';
    if (!userLang.startsWith('es')) {
      // Toggle to English
      document.getElementById('badge').innerText = 'Offline Mode';
      document.getElementById('title').innerText = 'Connection Lost';
      document.getElementById('desc').innerText = 'It looks like you have entered a digital shadow zone. Do not worry, your AI agents are saved securely in the cloud. Connect again to resume creating!';
      document.getElementById('btn-text').innerText = 'Retry Connection';
    }

    function retryConnection() {
      const button = document.querySelector('.btn-retry');
      const icon = button.querySelector('.material-symbols-outlined');
      
      // Spinner rotation effect
      icon.style.transition = 'transform 1s ease-in-out';
      icon.style.transform = 'rotate(360deg)';
      
      setTimeout(() => {
        window.location.reload();
      }, 500);
    }
  </script>
</body>
</html>
